<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Petify – Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-wave"></div>

  <main class="wrapper wrapper--wide">

    <!-- Logo -->
    <div class="logo-block" style="width:100%;align-items:center;">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
        <rect width="80" height="80" rx="18" fill="#1a3d35"/>
        <ellipse cx="40" cy="50" rx="13" ry="11" fill="rgba(255,255,255,.9)"/>
        <ellipse cx="26" cy="37" rx="7"  ry="9"  fill="rgba(255,255,255,.9)"/>
        <ellipse cx="38" cy="32" rx="7"  ry="9"  fill="rgba(255,255,255,.9)"/>
        <ellipse cx="50" cy="32" rx="7"  ry="9"  fill="rgba(255,255,255,.9)"/>
        <ellipse cx="62" cy="37" rx="7"  ry="9"  fill="rgba(255,255,255,.9)"/>
      </svg>
      <span class="logo-name">PETIFY</span>
    </div>

    <!-- Card de registro -->
    <div class="card card--register">
      <h2 class="card-title">Crear cuenta</h2>
      <p class="card-sub">Completa tus datos para registrarte</p>

      <!-- Fila: Nombre + Apellidos -->
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre <span class="required">*</span></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre"/>
          </div>
          <span class="error-msg" id="err-nombre"></span>
        </div>

        <div class="form-group">
          <label for="apellidos">Apellidos <span class="required">*</span></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos"/>
          </div>
          <span class="error-msg" id="err-apellidos"></span>
        </div>
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label for="correo">Correo electrónico <span class="required">*</span></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" autocomplete="email"/>
        </div>
        <span class="error-msg" id="err-correo"></span>
      </div>

      <!-- Teléfono -->
      <div class="form-group">
        <label for="telefono">Teléfono <span class="required">*</span></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.86 19.86 0 0 1 3.08 4.18 2 2 0 0 1 5.09 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <input type="tel" id="telefono" name="telefono" placeholder="10 dígitos" autocomplete="tel"/>
        </div>
        <span class="error-msg" id="err-telefono"></span>
      </div>

      <!-- Fila: Contraseña + Verificación -->
      <div class="form-row">
        <div class="form-group">
          <label for="password">Contraseña <span class="required">*</span></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres"/>
            <button type="button" class="toggle-pass" data-target="password" aria-label="Mostrar contraseña">
              <!-- ojo abierto -->
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- ojo cerrado -->
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a18.1 18.1 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="err-password"></span>
          <div id="password-requisitos" style="display:none;flex-direction:column;gap:.2rem;margin-top:.5rem;font-size:.8rem;">
            <span id="req-length"  class="req-item">✗ Mínimo 8 caracteres</span>
            <span id="req-upper"   class="req-item">✗ Al menos 1 mayúscula</span>
            <span id="req-number"  class="req-item">✗ Al menos 1 número</span>
            <span id="req-special" class="req-item">✗ Al menos 1 carácter especial (!@#$...)</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm">Verificar contraseña <span class="required">*</span></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <input type="password" id="confirm" name="confirm" placeholder="Repite tu contraseña"/>
            <button type="button" class="toggle-pass" data-target="confirm" aria-label="Mostrar contraseña">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a18.1 18.1 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="err-confirm"></span>
        </div>
      </div>

      <button class="btn-acceso" id="btn-register">Crear cuenta</button>

      <div class="links">
        <a href="login.jsp">¿Ya tienes cuenta? Inicia sesión</a>
        <a href="index.jsp">← Volver al inicio</a>
      </div>
    </div>

  </main>

  <script src="registroUsuario.js"></script>
</body>
</html>
